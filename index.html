<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Golden State Warriors Logo History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Golden State Warriors Logo History </h1>


    <div class="accordion" id="accordionExample"><!-- THIS DIV GOES AROUND ALLLLL ACCORDION ITEMS -->
        <!-- START OF FIRST ACCORDION ITEM -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="collapse"
                    aria-expanded="true" aria-controls="collapse">
                    Golden State Warriors logo #1
                </button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
                <div class="accordion-body">
                    <strong><img src="img\download (5).jpg" alt="Warriors first logo"></strong> This is the Golden State
                    Warriors first logo from 1946-1951.
                </div>
            </div>
        </div>
        <!-- END OF FIRST ACCORDION ITEM -->
        <!-- START OF SECOND ACCORDION ITEM -->
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapse">
                    Golden State Warriors Logo #2
                </button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                <div class="accordion-body">
                    <strong><img src="img/download (6).jpg" alt="Warriors second logo"></strong> This is the Golden
                    State
                    Warriors second logo from 1951-1962
                </div>
            </div>
        </div>
        <!-- END OF SECOND ACCORDION ITEM -->
         <!-- START OF THIRD ACCORDION ITEM -->
        <div class="accordion-item"><!-- WHERE DOES THIS DIV CLOSE? -->
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                    Golden State Warriors logo #3
                </button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                <div class="accordion-body">
                    <strong><img src="img/download (7).jpg" alt="Warriors third logo"></strong>
                    <!-- MISSING A LOT OF CLOSING DIVS -->
                    <!-- WE ARE ADDING ANOTHER ACCORDION HERE. WE SHOULD ONLY BE ADDING ACCORDION ITEMS -->
                    <div class="accordion" id="accordionExample">
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                    data-bs-target="#collapseTwo" aria-expanded="true" aria-controls="collapseThree">
                                    Golden State Warriors Logo #4
                                </button>
                            </h2>






                            <div id="collapseOne" class="accordion-collapse collapse show"
                                data-bs-parent="#accordionExample">
                                <div class="accordion-body">
                                    <strong><img src="img/download (8).jpg" alt="Warriors 4th logo"></strong>
                                </div>
                            </div>
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseOne">
                                        Golden sate warriors Logo #5
                                    </button>
                                </h2>
                                <div id="collapseThree" class="accordion-collapse collapse"
                                    data-bs-parent="#accordionExample">
                                    <div class="accordion-body">
                                        <strong><img src="img/download (9).jpg" alt="Warriors 5th logo"></strong>
                                    </div>
                                </div>
                            </div>
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#collapseThree" aria-expanded="false"
                                        aria-controls="collapseThree">
                                        Golden State Warriors Logo #6
                                    </button>
                                </h2>
                                <div id="collapseThree" class="accordion-collapse collapse"
                                    data-bs-parent="#accordionExample">
                                    <div class="accordion-body">
                                        <strong><img src="img/download (10).jpg" alt="Warriors 6th logo"></strong>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
